<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor">
  <!-- Outer bowl of the 'e' — arc with opening at the lower-right -->
  <path
    d="M 50 32 A 18 18 0 1 0 44.73 44.73"
    stroke-width="3.5"
    stroke-linecap="round"
  />
  <!-- Crossbar as a graph edge: hairline between two nodes -->
  <line
    x1="14"
    y1="32"
    x2="50"
    y2="32"
    stroke-width="1.2"
    stroke-opacity="0.55"
  />
  <!-- Nodes at each end of the crossbar -->
  <circle cx="14" cy="32" r="2.5" fill="currentColor" stroke="none" />
  <circle cx="50" cy="32" r="2.5" fill="currentColor" stroke="none" />
</svg>
